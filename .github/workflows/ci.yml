name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  ruff:
    name: Ruff
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache conda environment
        uses: actions/cache@v4
        with:
          path: ~/miniconda3/envs/NeptuneOD
          key: conda-env-${{ runner.os }}-${{ hashFiles('environment.yml') }}
          restore-keys: |
            conda-env-${{ runner.os }}-

      - name: Setup Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          environment-file: environment.yml
          activate-environment: NeptuneOD
          auto-activate-base: false

      - name: Upgrade packaging tools
        shell: bash -l {0}
        run: |
          python -m pip install --upgrade pip setuptools wheel

      - name: Install package
        shell: bash -l {0}
        run: |
          pip install -e .

      - name: Ruff lint
        shell: bash -l {0}
        run: |
          ruff check .

      - name: Ruff format
        shell: bash -l {0}
        run: |
          ruff format .

      - name: Commit formatting changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "style: auto-format with ruff"

  tests:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache conda environment
        uses: actions/cache@v4
        with:
          path: ~/miniconda3/envs/NeptuneOD
          key: conda-env-${{ runner.os }}-${{ hashFiles('environment.yml') }}
          restore-keys: |
            conda-env-${{ runner.os }}-

      - name: Setup Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          environment-file: environment.yml
          activate-environment: NeptuneOD
          auto-activate-base: false

      - name: Upgrade packaging tools
        shell: bash -l {0}
        run: |
          python -m pip install --upgrade pip setuptools wheel

      - name: Install package
        shell: bash -l {0}
        run: |
          pip install -e .

      - name: Run tests
        shell: bash -l {0}
        run: |
          pytest