name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Cache conda
        uses: actions/cache@v4
        with:
          path: |
            ~/miniconda3/pkgs
            ~/miniconda3/envs
          key: conda-${{ runner.os }}-${{ hashFiles('environment.yml') }}
          restore-keys: |
            conda-${{ runner.os }}-
              
      - name: Setup Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          environment-file: environment.yml
          activate-environment: NeptuneOD
          auto-activate-base: false
          use-only-tar-bz2: true

      - name: Lint (Ruff)
        shell: bash -l {0}
        run: |
          ruff check .

      - name: Format check (Ruff)
        shell: bash -l {0}
        run: |
          ruff format --check .

      - name: Run tests
        shell: bash -l {0}
        run: |
          pytest