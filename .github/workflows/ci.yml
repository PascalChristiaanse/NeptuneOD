name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  ruff:
    name: Ruff
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          environment-file: environment.yml
          activate-environment: NeptuneOD
          auto-activate-base: false
          cache: true
          cache-environment: true

      - name: Upgrade packaging tools
        shell: bash -l {0}
        run: |
          python -m pip install --upgrade pip setuptools wheel

      - name: Install package
        shell: bash -l {0}
        run: |
          pip install -e .

      - name: Ruff lint
        shell: bash -l {0}
        run: |
          ruff check .

      - name: Ruff format check
        shell: bash -l {0}
        run: |
          ruff format --check .

  tests:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          environment-file: environment.yml
          activate-environment: NeptuneOD
          auto-activate-base: false
          cache: true
          cache-environment: true

      - name: Upgrade packaging tools
        shell: bash -l {0}
        run: |
          python -m pip install --upgrade pip setuptools wheel

      - name: Install package
        shell: bash -l {0}
        run: |
          pip install -e .

      - name: Run tests
        shell: bash -l {0}
        run: |
          pytest