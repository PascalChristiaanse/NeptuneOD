# @package _global_
# Example experiment: Atanas2026 with simulated observations only
# Uses the new observation collection architecture with Hydra defaults composition

defaults:
  - /collections/triton_nsdb_generated # Compose NSDB observation collection
  - _self_ # Apply experiment config fields after collections

seed: 42

# Hydra settings
hydra:
  run:
    dir: results/${hydra.job.name}/${git_commit:}/${now:%Y-%m-%d_%H-%M-%S}
  job:
    chdir: false

logging:
  level: "INFO"
  tudatpy_logging_level: "WARNING"
  muted_loggers:
    - "matplotlib"
    # - "orbitdet.data.kernel"
