residual_histogram:
  output_file: "residual_histogram.pdf"
  figure:
    width: 16.54
    height: 8.27
  titles:
    ra: "Right Ascension Residuals"
    dec: "Declination Residuals"
    suptitle: "Residual Histograms for {target_name}"
  axes:
    x_label: "Residual [arcsec]"
    y_label: "Probability Density"
    hover_x_label: "Residual [arcsec]"
    hover_y_label: "Probability Density"
  styling:
    cmap: "tab10"
    n_bins: 30
    bell_curve_color: "red"
    bell_curve_lw: 1.5
  legend:
    ncols: 2
    bbox_to_anchor:
      x: 0.5
      y: -0.15
